# Основной сервер
# В timeweb.cloud SSL обрабатывается на уровне платформы (прокси/балансировщик)
# Nginx получает уже расшифрованный трафик через порт 80
# Редирект HTTP -> HTTPS настраивается в панели timeweb.cloud
server {
    listen 80;
    server_name littlebarista.ru www.littlebarista.ru;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Логирование с учетом реального IP через прокси
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    
    # Handle Next.js static export routing
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
    
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}

